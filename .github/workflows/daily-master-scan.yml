name: Daily default branch scan

on:
  schedule:
    - cron: "0 2 * * 1-5"  # Monday to Friday at 02:00 UTC
  workflow_dispatch: # allow manual trigger for testing

jobs:
  fetch-targets:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - name: Obtain OIDC token
        id: oidc
        run: |
          token=$(curl -sf \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}" \
            | jq -r '.value')
          echo "token=$token" >> $GITHUB_OUTPUT
        env:
          OIDC_AUDIENCE: ${{ vars.OIDC_AUDIENCE || 'security-dashboard' }}

      - name: Fetch scan targets from dashboard
        id: targets
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: |
          response=$(curl -sw "\n%{http_code}" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.token }}" \
            "${DASHBOARD_URL}/api/services/scan-targets")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          if [ "$http_code" != "200" ]; then
            echo "::error::Scan targets fetch failed with HTTP $http_code: $body"
            exit 1
          fi

          matrix=$(echo "$body" | jq -c '.targets | map(select(.repository != null))')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  scan:
    needs: fetch-targets
    if: ${{ needs.fetch-targets.outputs.matrix != '[]' && needs.fetch-targets.outputs.matrix != '' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.fetch-targets.outputs.matrix) }}
    uses: ./.github/workflows/tier-1-security-scans.yml
    with:
      repository: ${{ matrix.target.repository }}
      branch: ${{ matrix.target.default_branch || 'master' }}
      service: ${{ matrix.target.service }}
      repository_url: ${{ matrix.target.repository_url }}
      actor: "daily-cron"
      blocking: false
    secrets: inherit
